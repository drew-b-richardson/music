# ─────────────────────────────────────────────────────────────────
# Live Performance Recording — Configuration
# Edit these values to match your setup.
# ─────────────────────────────────────────────────────────────────

obs:
  host: localhost
  port: 4455
  password: ""          # Leave empty if you didn't set a password in OBS

ableton:
  host: localhost
  port: 11000           # AbletonOSC default (do not change unless you changed it in AbletonOSC)
  # Number of Down-arrow presses to reach "Collect All and Save" in Ableton's File menu.
  # In Live 11/12 this is typically 7 (separators are skipped during navigation).
  # If the wrong menu item is selected, adjust up or down by 1.
  collect_menu_steps: 7

sessions:
  # Where session folders are created. ~ expands to your home directory on
  # both Windows and macOS.
  base_path: ~/Music/recordings

produce:
  # Resolution of each grid cell. 960x540 → 1920x1080 total for 2x2 grid.
  cell_resolution: "960x540"
  cell_gap: 8                # Pixels of black margin around each cell (0 to disable)
  video_crf: 18          # Lower = higher quality (18 is near-lossless)
  audio_bitrate: "320k"
  av_offset: 0.5         # Seconds to delay audio relative to video (increase if audio is ahead)
  fade_duration: 1.0     # Seconds for fade in/out (set to 0 to disable)
